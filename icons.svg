<svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <!--
        Justin the Practice — icon pack.
        Language: 24px grid, 1.75 stroke, round caps, ink strokes via currentColor,
        one clay (#A38067) accent per icon. Icons that sit on a clay background
        (e.g. the trail pin chip) keep their accent in currentColor instead.
        Usage: <svg class="..."><use href="icons.svg#i-name"></use></svg>
        (prefix ../ from subdirectories).
    -->

    <!-- Principles (match the homepage originals) -->
    <symbol id="i-signal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12h3.5l2.5-6 4.5 12 2.5-6h3"/>
        <circle cx="20.5" cy="12" r="1.7" fill="#A38067" stroke="none"/>
    </symbol>
    <symbol id="i-terrain" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 19.5 9.5 9l4 7 2.5-4 5 7.5"/>
        <path d="M2.5 19.5h19"/>
        <circle cx="18.5" cy="5.5" r="1.7" fill="#A38067" stroke="none"/>
    </symbol>
    <symbol id="i-structure" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round">
        <path d="M7.5 7.5H19M7.5 12h8M7.5 16.5h4.5"/>
        <circle cx="4.5" cy="7.5" r="1.7" fill="#A38067" stroke="none"/>
    </symbol>
    <symbol id="i-quality" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3.5 19 6.5v5c0 4.2-2.8 7.2-7 8.9-4.2-1.7-7-4.7-7-8.9v-5l7-3z"/>
        <path d="M9.3 11.8l1.9 1.9 3.5-3.9" stroke="#A38067"/>
    </symbol>
    <symbol id="i-strength" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round">
        <path d="M6.5 6.5v11M17.5 6.5v11M3.5 9.5v5M20.5 9.5v5"/>
        <path d="M6.5 12h11" stroke="#A38067"/>
    </symbol>

    <!-- Journey / booking -->
    <symbol id="i-pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 21s-6.5-5.4-6.5-10a6.5 6.5 0 1 1 13 0c0 4.6-6.5 10-6.5 10z"/>
        <circle cx="12" cy="10.6" r="2.3"/>
    </symbol>
    <symbol id="i-calendar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3.5" y="5" width="17" height="15.5" rx="2"/>
        <path d="M3.5 9.5h17M8 3v3.5M16 3v3.5"/>
        <circle cx="12" cy="14.75" r="1.7" fill="#A38067" stroke="none"/>
    </symbol>
    <symbol id="i-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="8.5"/>
        <path d="M12 7.5V12l3 2" stroke="#A38067"/>
    </symbol>
    <symbol id="i-conversation" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.5 11.2c0 4-3.8 7.2-8.5 7.2-1 0-2-.14-2.9-.4L4 19.5l1.3-3.4A6.9 6.9 0 0 1 3.5 11.2c0-4 3.8-7.2 8.5-7.2s8.5 3.2 8.5 7.2z"/>
        <circle cx="8.8" cy="11.2" r="1.1" fill="#A38067" stroke="none"/>
        <circle cx="12" cy="11.2" r="1.1" fill="#A38067" stroke="none"/>
        <circle cx="15.2" cy="11.2" r="1.1" fill="#A38067" stroke="none"/>
    </symbol>
    <symbol id="i-letter" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="5.5" width="18" height="13" rx="2"/>
        <path d="M3.5 7.5 12 13.5l8.5-6" stroke="#A38067"/>
    </symbol>
    <symbol id="i-compass" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="8.5"/>
        <path d="M15.2 8.8l-1.8 4.6-4.6 1.8 1.8-4.6 4.6-1.8z" stroke="#A38067"/>
    </symbol>

    <!-- Library / resources -->
    <symbol id="i-doc" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 3.5H6.5A1.5 1.5 0 0 0 5 5v14a1.5 1.5 0 0 0 1.5 1.5h11A1.5 1.5 0 0 0 19 19V8.5L14 3.5z"/>
        <path d="M14 3.5V8.5H19"/>
        <path d="M8.5 13h7M8.5 16.5h4.5" stroke="#A38067"/>
    </symbol>
    <symbol id="i-leaf" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19.5 4.5c.4 7.8-3.4 14-9.3 14-2.7 0-4.7-1.5-5.7-3.6C6.6 8.6 12 4.9 19.5 4.5z"/>
        <path d="M4.5 19.5C8 14 12.5 10.5 17 8.5" stroke="#A38067"/>
    </symbol>
    <symbol id="i-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round">
        <circle cx="12" cy="12" r="4.2"/>
        <path d="M12 2.8v2.4M12 18.8v2.4M2.8 12h2.4M18.8 12h2.4M5.5 5.5l1.7 1.7M16.8 16.8l1.7 1.7M18.5 5.5l-1.7 1.7M7.2 16.8l-1.7 1.7" stroke="#A38067"/>
    </symbol>
    <symbol id="i-stopwatch" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="13.5" r="7"/>
        <path d="M10 3h4M12 3v2.5M18.2 8.2l1.4-1.4"/>
        <path d="M12 13.5l2.8-2.8" stroke="#A38067"/>
    </symbol>
    <symbol id="i-kettlebell" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8.5 9.6V7A2.5 2.5 0 0 1 11 4.5h2A2.5 2.5 0 0 1 15.5 7v2.6"/>
        <circle cx="12" cy="14.3" r="5.7"/>
        <path d="M9.4 14.3a2.6 2.6 0 0 1 2.6-2.6" stroke="#A38067"/>
    </symbol>

    <!-- People / states -->
    <symbol id="i-person" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="3.5" stroke="#A38067"/>
        <path d="M5 20c.8-3.6 3.6-5.5 7-5.5s6.2 1.9 7 5.5"/>
    </symbol>
    <symbol id="i-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="8.5"/>
        <path d="M8.4 12.3l2.4 2.4 4.8-5.2" stroke="#A38067"/>
    </symbol>
    <symbol id="i-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
    </symbol>
</svg>
